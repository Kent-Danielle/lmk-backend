info:
  name: Join Session
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}sessions/{{session_id}}/participants"
  body:
    type: json
    data: |2-
        {
          "display_name": "Participant 1"
        }
  auth: inherit

runtime:
  variables:
    - name: base_url
      value: http://localhost:8000/
    - name: session_id
      value: 2d0bcafa-b19f-4f0b-80cb-0ab9cf8fd560

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
